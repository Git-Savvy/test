# Long YAML config to test:
# - anchors
# - nested maps/lists
# - multiline strings
# - numeric/string edge cases

defaults: &defaults
  retries: 3
  timeout_s: 30
  log_level: info
  max_file_size_mb: 2
  max_line_length: 20000

index:
  repo:
    owner: owner
    name: name
    default_branch: main
  behavior:
    follow_symlinks: false
    detect_generated: true
    detect_minified: true
    strict_parsing: false
  chunking:
    strategy: lines
    lines_per_chunk: 30
    overlap_lines: 3
    max_chunks_per_file: 2000

services:
  api:
    <<: *defaults
    host: 0.0.0.0
    port: 8000
    env:
      - name: DB_URL
        value: postgresql://user:pass@db:5432/app
      - name: ENABLE_EMBEDDINGS
        value: "true"
    notes: |
      Multiline notes:
      - This section is intentionally long.
      - YAML block scalars should remain intact.
      - Chunkers should keep the block as a unit if possible.

  worker:
    <<: *defaults
    concurrency: 4
    queues:
      - index
      - embed
      - cleanup
    backoff:
      enabled: true
      initial_s: 2
      max_s: 60

rules:
  skip_dirs:
    - node_modules
    - .git
    - dist
    - build
    - coverage
    - .venv
  skip_ext:
    - .png
    - .jpg
    - .jpeg
    - .gif
    - .webp
    - .pdf
    - .zip
    - .tar
    - .gz
  include_ext:
    - .py
    - .ts
    - .tsx
    - .md
    - .yml
  allow_hidden_files: false

debug:
  dump_symbols: true
  dump_chunks: false
  sample_rate: 0.05
