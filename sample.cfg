# Long CFG-like config file

app.name = indexer
app.version = 1.2.0
app.debug = false
app.env = prod

paths.repos_root = ./repos
paths.output_dir = ./out
paths.temp_dir = ./tmp

limits.max_file_size_mb = 2
limits.max_symbols_per_file = 5000
limits.max_chunks_per_file = 2000
limits.max_line_length = 20000

rules.skip_dirs = node_modules, .git, dist, build, coverage, .venv
rules.skip_ext = .png, .jpg, .jpeg, .gif, .webp, .pdf, .zip, .tar, .gz
rules.include_ext = .py, .js, .ts, .tsx, .md, .yml, .yaml, .json, .toml, .ini, .cfg, .html, .css, .scss, .sh, .bat

chunking.strategy = lines
chunking.lines_per_chunk = 30
chunking.overlap_lines = 3

fallback.on_parse_error = text_scan
fallback.on_timeout = partial
fallback.on_oom = skip_file

db.url = postgresql://user:pass@db:5432/app
db.pool_size = 20
db.echo = false
