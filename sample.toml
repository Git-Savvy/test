# Long TOML config for indexer

[app]
name = "indexer"
version = "1.2.0"
debug = true
environment = "dev"

[paths]
repos_root = "./repos"
output_dir = "./out"
temp_dir = "./tmp"

[limits]
max_file_size_mb = 2
max_symbols_per_file = 5000
max_chunks_per_file = 2000
max_line_length = 20000

[rules]
skip_dirs = ["node_modules", ".git", "dist", "build", "coverage", ".venv"]
skip_ext  = [".png", ".jpg", ".jpeg", ".gif", ".webp", ".pdf", ".zip", ".tar", ".gz"]
include_ext = [".py", ".js", ".ts", ".tsx", ".md", ".yml", ".yaml", ".json", ".toml", ".ini", ".cfg", ".html", ".css", ".scss", ".sh", ".bat"]

[chunking]
strategy = "lines"
lines_per_chunk = 30
overlap_lines = 3

[fallback]
on_parse_error = "text_scan"
on_timeout = "partial"
on_oom = "skip_file"

[[pipelines]]
name = "ast"
enabled = true
languages = ["python", "javascript", "typescript", "java", "go", "rust", "cpp"]

[[pipelines]]
name = "text"
enabled = true
formats = ["md", "rst", "txt", "yaml", "toml", "ini", "cfg", "html", "css", "scss"]
